<h2 style="margin-top: 0;">Configurações Globais de Acesso</h2>
<p>Defina as políticas de acesso. Estas alterações têm impacto imediato na arquitetura Zero Trust e são registadas na
    auditoria.</p>

<div id="settingsAlert"
    style="display: none; padding: 10px; margin-bottom: 15px; border: 1px solid #000; font-weight: bold;"></div>

<div class="win95-window" style="width: 100%; max-width: 600px; margin-top: 20px;">
    <div class="win95-titlebar">Politicas.exe</div>
    <div class="win95-content" style="background: #c0c0c0;">
        <form id="globalSettingsForm">
            <div class="win95-checkbox-group">
                <input type="checkbox" id="allow_profile_photos_on_signup">
                <label for="allow_profile_photos_on_signup">Permitir fotografia de perfil no registo (Coordenação e
                    Alunos)</label>
            </div>
            <div class="win95-checkbox-group">
                <input type="checkbox" id="allow_coordinators_login">
                <label for="allow_coordinators_login">Habilitar acesso externo para Coordenação Escolar</label>
            </div>
            <div class="win95-checkbox-group">
                <input type="checkbox" id="allow_students_login">
                <label for="allow_students_login">Habilitar acesso externo para Alunos e Familiares</label>
            </div>

            <div style="margin-top: 20px; border-top: 2px solid #808080; padding-top: 15px;">
                <button type="submit" class="win95-button" style="width: 150px; font-weight: bold;">Aplicar
                    Políticas</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/components/AdminSettings.js"></script>
