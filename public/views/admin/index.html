<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Shell</title>
    <link rel="stylesheet" href="assets/css/admin/theme.css">
    <script src="assets/js/bootstrapper.js"></script>
</head>

<body>

    <div id="sidebar-container"></div>
    <main id="main-content">
        <div class="win95-window" style="height: 100%;">
            <div class="win95-titlebar"><span>System_Explorer.exe</span></div>
            <div id="app-view" class="win95-content">A carregar kernel...</div>
        </div>
    </main>

    <div id="initWarningModal" class="win95-modal-overlay">
        <div class="win95-window" style="width: 400px;">
            <div class="win95-titlebar">Segurança</div>
            <div class="win95-content" style="background: #c0c0c0;">
                <p><strong>Configuração Inicial Pendente</strong></p>
                <p>O sistema requer a definição das políticas LGPD antes do uso total.</p>
                <div style="text-align: right; margin-top: 20px;">
                    <button class="win95-button" style="width:100px; font-weight:bold"
                        onclick="closeInitModal()">Configurar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/components/AdminSidebar.js"></script>
    <script>
        SecurityBootstrapper.enforceRole('master');

        window.AppRouter = class {
            static async load(viewName) {
                try {
                    // Forçamos o caminho correto das views dentro de public
                    const response = await fetch(`views/admin/${viewName}.html`);
                    if (!response.ok) throw new Error();
                    const html = await response.text();

                    const appView = document.getElementById('app-view');
                    appView.innerHTML = html;

                    // Reinjeção de scripts dinâmicos para componentes
                    appView.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        newScript.src = oldScript.src;
                        newScript.className = 'dynamic-script';
                        document.body.appendChild(newScript);
                    });
                } catch (e) {
                    document.getElementById('app-view').innerHTML = '<h3 style="color:red">ERRO: Falha ao injetar componente.</h3>';
                }
            }
        };

        async function checkSetup() {
            try {
                const token = localStorage.getItem('sys_token');
                const r = await fetch('api/master/config/get', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const res = await r.json();
                if (res.status === 'success' && res.data.status === 'pending_setup') {
                    document.getElementById('initWarningModal').style.display = 'flex';
                }
            } catch (e) { }
        }

        function closeInitModal() {
            document.getElementById('initWarningModal').style.display = 'none';
            window.AppRouter.load('settings');
        }

        document.getElementById('sidebar-container').innerHTML = window.AdminSidebar.render();
        window.AppRouter.load('dashboard');
        checkSetup();
    </script>
</body>

</html>
