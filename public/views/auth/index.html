<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A carregar...</title>
    <link rel="stylesheet" href="assets/css/auth/layout.css">
    <link rel="stylesheet" href="assets/css/global/loader.css">
</head>

<body>

    <div id="global-loader-overlay">
        <div class="modern-spinner"></div>
    </div>

    <div id="auth-root"></div>

    <script src="assets/js/components/global/GlobalLoader.js"></script>
    <script src="assets/js/auth/theme-loader.js"></script>
    <script src="assets/js/components/AuthLogin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            window.GlobalLoader.show();

            const token = localStorage.getItem('sys_token');
            if (token) localStorage.removeItem('sys_token');

            await window.ThemeLoader.boot();

            const root = document.getElementById('auth-root');
            root.innerHTML = window.AuthLoginComponent.render();
            window.AuthLoginComponent.attachEvents();

            window.GlobalLoader.hide();
        });
    </script>

</body>

</html>
