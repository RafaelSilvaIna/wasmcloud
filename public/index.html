<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School System - Ambiente Seguro</title>
    <script src="assets/js/bootstrapper.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f8fafc;
            display: flex;
        }

        #sidebar-container {
            width: 260px;
            flex-shrink: 0;
        }

        #main-content {
            flex: 1;
            padding: 40px;
        }
    </style>
</head>

<body>

    <div id="sidebar-container"></div>
    <main id="main-content">
        <div id="app-view">Carregando modulo seguro...</div>
    </main>

    <script src="assets/js/components/AdminSidebar.js"></script>
    <script>
        SecurityBootstrapper.enforceRole('master');

        class AppRouter {
            static async load(viewName) {
                try {
                    const response = await fetch(`views/admin/${viewName}.html`);
                    if (!response.ok) throw new Error('Modulo inacessivel');
                    const html = await response.text();
                    document.getElementById('app-view').innerHTML = html;
                } catch (error) {
                    document.getElementById('app-view').innerHTML = `<h3 style="color: red;">Modulo em desenvolvimento ou protegido.</h3>`;
                }
            }
        }

        document.getElementById('sidebar-container').innerHTML = AdminSidebar.render();

        AppRouter.load('dashboard');
    </script>

</body>

</html>
