<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0" />
    </radialGradient>
    
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e50914" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background center glow -->
  <circle cx="400" cy="200" r="100" fill="url(#centerGlow)" opacity="0.3">
    <animate attributeName="r" values="100;120;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Orbit Ring 1 -->
  <ellipse cx="400" cy="200" rx="350" ry="80" fill="none" stroke="url(#ringGradient)" stroke-width="2" opacity="0.6" filter="url(#neon)">
    <animateTransform attributeName="transform" type="rotate" from="0 400 200" to="360 400 200" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Platform points on Ring 1 -->
  <g filter="url(#neon)">
    <!-- Netflix -->
    <circle r="8" fill="#e50914">
      <animateMotion path="M 400 200 m -350 0 a 350 80 0 1 0 700 0 a 350 80 0 1 0 -700 0" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Disney+ -->
    <circle r="8" fill="#e50914">
      <animateMotion path="M 400 200 m -350 0 a 350 80 0 1 0 700 0 a 350 80 0 1 0 -700 0" dur="20s" begin="6.67s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;12;8" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    
    <!-- HBO Max -->
    <circle r="8" fill="#e50914">
      <animateMotion path="M 400 200 m -350 0 a 350 80 0 1 0 700 0 a 350 80 0 1 0 -700 0" dur="20s" begin="13.33s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;12;8" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Orbit Ring 2 -->
  <ellipse cx="400" cy="200" rx="250" ry="60" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="360 400 200" to="0 400 200" dur="15s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Platform points on Ring 2 -->
  <g>
    <!-- Prime Video -->
    <circle r="6" fill="#ff6b6b" opacity="0.9">
      <animateMotion path="M 400 200 m -250 0 a 250 60 0 1 1 500 0 a 250 60 0 1 1 -500 0" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;9;6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Apple TV+ -->
    <circle r="6" fill="#ff6b6b" opacity="0.9">
      <animateMotion path="M 400 200 m -250 0 a 250 60 0 1 1 500 0 a 250 60 0 1 1 -500 0" dur="15s" begin="7.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;9;6" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Orbit Ring 3 -->
  <ellipse cx="400" cy="200" rx="150" ry="40" fill="none" stroke="rgba(229,9,20,0.5)" stroke-width="1" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 400 200" to="360 400 200" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Connection lines from center to platforms -->
  <g stroke="rgba(229,9,20,0.3)" stroke-width="1" fill="none">
    <line x1="400" y1="200" x2="50" y2="200">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="750" y2="200">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="400" y2="120">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="400" y2="280">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Central PipoCine Hub -->
  <circle cx="400" cy="200" r="20" fill="#e50914" filter="url(#neon)">
    <animate attributeName="r" values="20;25;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Pulsing rings around center -->
  <circle cx="400" cy="200" r="30" fill="none" stroke="#e50914" stroke-width="2" opacity="0.8">
    <animate attributeName="r" values="30;60;30" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="400" cy="200" r="40" fill="none" stroke="#e50914" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="40;80;40" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Streaming particles -->
  <g fill="#ff6b6b">
    <circle r="2">
      <animateMotion path="M 400 200 L 50 200" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="2">
      <animateMotion path="M 400 200 L 750 200" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2">
      <animateMotion path="M 400 200 L 400 120" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2">
      <animateMotion path="M 400 200 L 400 280" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
