<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="pulseGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0" />
    </radialGradient>
    
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  
  <!-- Multiple pulsing rings -->
  <g fill="none" stroke="url(#pulseGradient)" stroke-width="2" filter="url(#pulseGlow)">
    <circle cx="200" cy="200" r="30">
      <animate attributeName="r" values="30;150;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="200" cy="200" r="30">
      <animate attributeName="r" values="30;150;30" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="200" cy="200" r="30">
      <animate attributeName="r" values="30;150;30" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="200" cy="200" r="30">
      <animate attributeName="r" values="30;150;30" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="200" cy="200" r="30">
      <animate attributeName="r" values="30;150;30" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Center logo placeholder -->
  <circle cx="200" cy="200" r="25" fill="#e50914">
    <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Rotating accent lines -->
  <g stroke="#ff6b6b" stroke-width="2" stroke-linecap="round">
    <line x1="200" y1="70" x2="200" y2="90" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="70" x2="200" y2="90" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="72 200 200" to="432 200 200" dur="10s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="70" x2="200" y2="90" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="144 200 200" to="504 200 200" dur="10s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="70" x2="200" y2="90" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="216 200 200" to="576 200 200" dur="10s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="70" x2="200" y2="90" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="288 200 200" to="648 200 200" dur="10s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
