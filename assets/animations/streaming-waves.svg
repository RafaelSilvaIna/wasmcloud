<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#e50914;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#e50914;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0" />
    </linearGradient>
    
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Animated wave paths -->
  <g fill="none" stroke="url(#waveGradient)" stroke-width="3" stroke-linecap="round">
    <!-- Wave 1 -->
    <path d="M 0 150 Q 150 100 300 150 T 600 150 T 900 150 T 1200 150">
      <animate attributeName="d" 
        values="M 0 150 Q 150 100 300 150 T 600 150 T 900 150 T 1200 150;
                M 0 150 Q 150 200 300 150 T 600 150 T 900 150 T 1200 150;
                M 0 150 Q 150 100 300 150 T 600 150 T 900 150 T 1200 150"
        dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Wave 2 -->
    <path d="M 0 150 Q 150 200 300 150 T 600 150 T 900 150 T 1200 150" opacity="0.6">
      <animate attributeName="d" 
        values="M 0 150 Q 150 200 300 150 T 600 150 T 900 150 T 1200 150;
                M 0 150 Q 150 100 300 150 T 600 150 T 900 150 T 1200 150;
                M 0 150 Q 150 200 300 150 T 600 150 T 900 150 T 1200 150"
        dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Wave 3 -->
    <path d="M 0 150 Q 150 120 300 150 T 600 150 T 900 150 T 1200 150" opacity="0.4" stroke-width="2">
      <animate attributeName="d" 
        values="M 0 150 Q 150 120 300 150 T 600 150 T 900 150 T 1200 150;
                M 0 150 Q 150 180 300 150 T 600 150 T 900 150 T 1200 150;
                M 0 150 Q 150 120 300 150 T 600 150 T 900 150 T 1200 150"
        dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating particles along the waves -->
  <g fill="#e50914">
    <circle r="3" opacity="0.8">
      <animateMotion path="M 0 150 Q 150 100 300 150 T 600 150 T 900 150 T 1200 150" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" opacity="0.6">
      <animateMotion path="M 0 150 Q 150 200 300 150 T 600 150 T 900 150 T 1200 150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" opacity="0.9">
      <animateMotion path="M 0 150 Q 150 120 300 150 T 600 150 T 900 150 T 1200 150" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" opacity="0.5">
      <animateMotion path="M 0 150 Q 150 180 300 150 T 600 150 T 900 150 T 1200 150" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" opacity="0.7">
      <animateMotion path="M 0 150 Q 150 100 300 150 T 600 150 T 900 150 T 1200 150" dur="8s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Vertical bars representing streaming data -->
  <g fill="rgba(229,9,20,0.3)" stroke="none">
    <rect x="100" y="200" width="4" height="40" rx="2">
      <animate attributeName="height" values="40;80;40" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="200;160;200" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="300" y="180" width="4" height="60" rx="2">
      <animate attributeName="height" values="60;100;60" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="180;140;180" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="500" y="190" width="4" height="50" rx="2">
      <animate attributeName="height" values="50;90;50" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="190;150;190" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="700" y="170" width="4" height="70" rx="2">
      <animate attributeName="height" values="70;110;70" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="170;130;170" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="900" y="185" width="4" height="55" rx="2">
      <animate attributeName="height" values="55;95;55" dur="1.7s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="185;145;185" dur="1.7s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.7s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="1100" y="195" width="4" height="45" rx="2">
      <animate attributeName="height" values="45;85;45" dur="1.9s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="195;155;195" dur="1.9s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.9s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
