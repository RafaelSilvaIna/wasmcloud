<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Main stream line -->
  <line x1="0" y1="50" x2="1200" y2="50" stroke="url(#streamGradient)" stroke-width="2">
    <animate attributeName="stroke-dasharray" values="0,1200;1200,0" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Data packets -->
  <g fill="#e50914">
    <rect x="-20" y="45" width="20" height="10" rx="2">
      <animate attributeName="x" values="-20;1220" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="45" width="15" height="10" rx="2">
      <animate attributeName="x" values="-20;1220" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="45" width="25" height="10" rx="2">
      <animate attributeName="x" values="-20;1220" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="45" width="18" height="10" rx="2">
      <animate attributeName="x" values="-20;1220" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="45" width="22" height="10" rx="2">
      <animate attributeName="x" values="-20;1220" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="45" width="16" height="10" rx="2">
      <animate attributeName="x" values="-20;1220" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Background dots -->
  <g fill="rgba(229,9,20,0.3)">
    <circle cx="100" cy="30" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="70" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="25" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="75" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="35" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="65" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
