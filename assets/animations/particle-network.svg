<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0" />
    </radialGradient>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Animated connecting lines -->
  <g stroke="rgba(229,9,20,0.3)" stroke-width="1" fill="none">
    <!-- Horizontal connections -->
    <line x1="100" y1="200" x2="250" y2="150">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;2;1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="150" x2="400" y2="200">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="550" y2="150">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="150" x2="700" y2="200">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="200" x2="850" y2="150">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="850" y1="150" x2="1000" y2="200">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </line>
    
    <!-- Vertical/angled connections -->
    <line x1="250" y1="150" x2="250" y2="250">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="150" x2="550" y2="250">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </line>
    <line x1="850" y1="150" x2="850" y2="250">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Platform nodes (main platforms) -->
  <g filter="url(#softGlow)">
    <!-- Netflix -->
    <circle cx="100" cy="200" r="12" fill="#e50914">
      <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Prime Video -->
    <circle cx="300" cy="200" r="10" fill="#00a8e1">
      <animate attributeName="r" values="10;14;10" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Disney+ -->
    <circle cx="500" cy="200" r="10" fill="#113ccf">
      <animate attributeName="r" values="10;14;10" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- HBO Max -->
    <circle cx="700" cy="200" r="10" fill="#9900ff">
      <animate attributeName="r" values="10;14;10" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Apple TV+ -->
    <circle cx="900" cy="200" r="10" fill="#fff">
      <animate attributeName="r" values="10;14;10" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Paramount+ -->
    <circle cx="1100" cy="200" r="10" fill="#0064ff">
      <animate attributeName="r" values="10;14;10" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Secondary floating nodes -->
  <g fill="url(#particleGlow)">
    <circle cx="250" cy="150" r="4">
      <animate attributeName="cy" values="150;140;150" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="250" r="4">
      <animate attributeName="cy" values="250;260;250" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="150" r="4">
      <animate attributeName="cy" values="150;140;150" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="250" r="4">
      <animate attributeName="cy" values="250;260;250" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="150" r="4">
      <animate attributeName="cy" values="150;140;150" dur="2s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="250" r="4">
      <animate attributeName="cy" values="250;260;250" dur="2s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Data flow particles along paths -->
  <g fill="#ff6b6b">
    <circle r="3">
      <animateMotion path="M 100 200 L 250 150" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 250 150 L 400 200" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 400 200 L 550 150" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 550 150 L 700 200" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 700 200 L 850 150" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 850 150 L 1000 200" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Background ambient particles -->
  <g fill="rgba(229,9,20,0.2)">
    <circle cx="200" cy="100" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="80" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="100" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="320" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
